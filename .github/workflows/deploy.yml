name: Build and Push to AWS ECR

on:
  push:
    branches: [ "master" ]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: digician
  IMAGE_TAG: latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    # 🧠 OIDC login (no keys)
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::270474166936:role/github_action_deployment
        aws-region: ${{ env.AWS_REGION }}

    # 🔐 Login to ECR
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    # ⚡ Enable Docker BuildKit (important for caching)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 🚀 Build + Push with caching
    - name: Build and Push (with cache)
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: 270474166936.dkr.ecr.ap-south-1.amazonaws.com/digician:latest

        # ⚡ caching magic
        cache-from: type=gha
        cache-to: type=gha,mode=max